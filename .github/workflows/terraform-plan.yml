name: "Terraform Plan"

# Runs on every PR to main — posts the plan as a PR comment for review
on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write       # Required for OIDC login to Azure
  contents: read        # Checkout repo
  pull-requests: write  # Post plan as PR comment

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Terraform ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"
          terraform_wrapper: true  # Enables step output capture for plan text

      # ── 3. Azure Login via OIDC (no client secrets stored anywhere) ──────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 4. Terraform Init (backend config from GitHub Variables) ─────────────
      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=fit-avd-india.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}"
        env:
          ARM_USE_OIDC:        true
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 5. Terraform Validate ────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── 6. Terraform Plan ────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true   # Post result as comment even on failure
        env:
          ARM_USE_OIDC:               true
          ARM_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID:        ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vm_admin_password:   ${{ secrets.TF_VAR_VM_ADMIN_PASSWORD }}

      # ── 7. Post Plan as PR Comment ───────────────────────────────────────────
      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const planOutput = process.env.PLAN_STDOUT;
            const planError  = process.env.PLAN_STDERR;
            const outcome    = "${{ steps.plan.outcome }}";
            const icon       = outcome === "success" ? "✅" : "❌";

            const body = [
              `## ${icon} Terraform Plan \`${outcome}\``,
              `**Branch:** \`${{ github.head_ref }}\` → \`main\`  |  **Commit:** \`${{ github.sha }}\``,
              "",
              `| Step | Result |`,
              `|------|--------|`,
              `| Init | \`${{ steps.init.outcome }}\` |`,
              `| Validate | \`${{ steps.validate.outcome }}\` |`,
              `| Plan | \`${outcome}\` |`,
              "",
              "<details><summary>📋 Click to expand Terraform Plan output</summary>",
              "",
              "```",
              planOutput || planError || "No output captured",
              "```",
              "",
              "</details>",
              "",
              "> ⚠️ **Review the plan above before approving this PR.**",
              "> Merging to `main` will automatically trigger `terraform apply`.",
            ].join("\n");

            // Remove previous bot plan comments to avoid clutter
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === "Bot" && c.body.includes("Terraform Plan")) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── 8. Fail the check if plan errored ────────────────────────────────────
      - name: Check Plan Result
        if: steps.plan.outcome == 'failure'
        run: exit 1
